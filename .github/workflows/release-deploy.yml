# Production deploys: trigger Vercel + Render via deploy hooks only (see secrets below).
# Disable Git auto-deploy on both platforms so pushes to main do not deploy; publish a
# GitHub Release to run this workflow (prereleases skip migrate + deploy hooks).
# After a successful production deploy, package.json versions are synced to the release tag
# and committed to the default branch (requires "Allow GitHub Actions to create and approve
# pull requests" or equivalent if branch protection blocks the bot).

name: Release deploy

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-deploy-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://127.0.0.1:5432/_prisma_ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      # ESLint (type-aware) needs generated Prisma Client; pnpm install does not run prisma generate.
      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Validate MVP (no DB)
        run: pnpm validate:mvp:no-db

  migrate:
    needs: validate
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ENV: prod
        run: pnpm exec prisma migrate deploy

  deploy:
    needs: [validate, migrate]
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$HOOK"

      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$HOOK"

  sync-version:
    needs: deploy
    if: ${{ !github.event.release.prerelease && success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version from tag
        id: tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Tag must be semver (e.g. v1.2.3), got: $TAG"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Sync package.json versions
        run: node scripts/sync-package-versions.mjs "${{ steps.tag.outputs.version }}"

      - name: Commit and push
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json apps/web/package.json apps/api/package.json
          if git diff --staged --quiet; then
            echo "Version already matches release; nothing to commit."
            exit 0
          fi
          git commit -m "chore(release): ${VERSION}"
          git push
