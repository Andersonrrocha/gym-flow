# Optional Render Blueprint — validate in the Render dashboard when importing.
# Env vars (DATABASE_URL, JWT_*, WEB_URL, APP_ENV) must be set in the service settings.
# autoDeployTrigger: off — deploy only via Deploy Hook (e.g. GitHub release workflow).

services:
  - type: web
    runtime: node
    name: gymflow-api
    rootDir: .
    autoDeployTrigger: "off"
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @gymflow/api build
    startCommand: pnpm --filter @gymflow/api start:prod
